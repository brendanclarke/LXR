<?xml version="1.0" encoding="UTF-8"?>
<!--
  LXR Panel Diagram Template
  Use this as a base for front or back panel diagrams.
  Panel background is dark (#1a1a1a). Controls are circles/rectangles.
  Annotation callouts use orange (#ff8c00) rounded rectangles with number labels.
  Edit viewBox and element positions to match physical layout.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" width="960" height="520">
  <style>
    .panel-bg   { fill:#1a1a1a; }
    .control    { fill:#3a3a3a; stroke:#555; stroke-width:1.5; }
    .led        { fill:#00cc00; }
    .led-off    { fill:#003300; }
    .button     { fill:#2a2a2a; stroke:#666; stroke-width:1; }
    .label      { font-family:monospace; font-size:9px; fill:#cccccc; text-anchor:middle; }
    .callout    { fill:#ff8c00; rx:12; }
    .callout-nr { font-family:sans-serif; font-size:14px; font-weight:bold;
                  fill:#ffffff; text-anchor:middle; dominant-baseline:middle; }
    .callout-line { stroke:#ff8c00; stroke-width:1.5; fill:none; }
    .oled-bg    { fill:#000000; }
    .oled-text  { font-family:monospace; font-size:14px; fill:#00ff44; }
  </style>

  <!-- Panel background -->
  <rect class="panel-bg" x="0" y="0" width="960" height="520" rx="8"/>

  <!-- ============================================================
    TEMPLATE ELEMENTS — replace with actual control positions
    ============================================================ -->

  <!-- Example: OLED display -->
  <rect class="oled-bg" x="80" y="50" width="200" height="60" rx="4"/>
  <text class="oled-text" x="95" y="78">Coa fin att dec</text>
  <text class="oled-text" x="95" y="100"> 12   0   0  78</text>

  <!-- Example: Knob -->
  <circle class="control" cx="100" cy="190" r="22"/>
  <circle class="control" cx="165" cy="190" r="22"/>
  <circle class="control" cx="230" cy="190" r="22"/>
  <circle class="control" cx="295" cy="190" r="22"/>

  <!-- Example: Callout annotation bubble -->
  <circle class="callout" cx="148" cy="60" r="16"/>
  <text class="callout-nr" x="148" y="61">1</text>

  <!-- Add more controls, LEDs, buttons here -->
  <!-- Callout line example -->
  <line class="callout-line" x1="148" y1="76" x2="148" y2="100"/>

  <!-- Panel title area (optional) -->
  <text font-family="sans-serif" font-size="11" fill="#888"
        x="10" y="515">LXR Front Panel — edit positions to match physical layout</text>
</svg>
