<?xml version="1.0" encoding="UTF-8"?>
<!--
  LXR Filter Frequency Response Plot Template
  Edit curve path data for each filter type.
  X axis: 0 Hz -> 22 kHz (logarithmic scale, mapped to x=60..740)
  Y axis: -18 dB -> +18 dB (linear, mapped to y=20..300)
  Cutoff marker: vertical dashed line at x=400 (mid-point example)
  Three resonance curves: low (red), medium (green), high (blue)
  Replace path d="..." with actual curve data per filter type.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="800" height="340">
  <style>
    .axis    { stroke:#333; stroke-width:1; fill:none; }
    .grid    { stroke:#ccc; stroke-width:0.5; stroke-dasharray:4,4; fill:none; }
    .label   { font-family:sans-serif; font-size:11px; fill:#333; text-anchor:middle; }
    .label-y { font-family:sans-serif; font-size:11px; fill:#333; text-anchor:end; }
    .cutoff  { stroke:#555; stroke-width:1; stroke-dasharray:6,4; fill:none; }
    .curve-lo  { stroke:#cc2222; stroke-width:2; fill:none; }  /* low resonance  */
    .curve-mid { stroke:#22aa22; stroke-width:2; fill:none; }  /* mid resonance  */
    .curve-hi  { stroke:#2244cc; stroke-width:2; fill:none; }  /* high resonance */
    .legend-box { fill:#fff; stroke:#aaa; stroke-width:1; }
    .legend-text{ font-family:sans-serif; font-size:10px; fill:#333; }
  </style>

  <!-- Plot area background -->
  <rect x="60" y="20" width="680" height="280" fill="#f9f9f9" stroke="#ccc" stroke-width="1"/>

  <!-- dB grid lines and labels: +18, +12, +6, 0, -6, -12, -18 -->
  <!-- 0dB is at y=160 (midpoint of 20..300), each 6dB = 23.3px -->
  <line class="grid" x1="60" y1="20"  x2="740" y2="20"/>   <!-- +18 -->
  <line class="grid" x1="60" y1="67"  x2="740" y2="67"/>   <!-- +12 -->
  <line class="grid" x1="60" y1="113" x2="740" y2="113"/>  <!-- +6  -->
  <line class="axis" x1="60" y1="160" x2="740" y2="160"/>  <!-- 0   -->
  <line class="grid" x1="60" y1="207" x2="740" y2="207"/>  <!-- -6  -->
  <line class="grid" x1="60" y1="253" x2="740" y2="253"/>  <!-- -12 -->
  <line class="grid" x1="60" y1="300" x2="740" y2="300"/>  <!-- -18 -->

  <text class="label-y" x="55" y="24">18dB</text>
  <text class="label-y" x="55" y="71">12dB</text>
  <text class="label-y" x="55" y="117">6dB</text>
  <text class="label-y" x="55" y="164">0dB</text>
  <text class="label-y" x="55" y="211">-6dB</text>
  <text class="label-y" x="55" y="257">-12dB</text>
  <text class="label-y" x="55" y="304">-18dB</text>

  <!-- Cutoff frequency marker (vertical dashed) -->
  <line class="cutoff" x1="400" y1="20" x2="400" y2="300"/>

  <!-- FILTER CURVES — replace path data per filter type -->
  <!-- Low resonance (red) -->
  <path class="curve-lo"  d="M60,160 Q200,160 380,162 Q410,164 740,190"/>
  <!-- Mid resonance (green) -->
  <path class="curve-mid" d="M60,160 Q200,160 370,150 Q400,140 420,170 Q500,190 740,195"/>
  <!-- High resonance (blue) -->
  <path class="curve-hi"  d="M60,160 Q200,160 360,130 Q395,80 415,185 Q460,210 740,200"/>

  <!-- Axes -->
  <line class="axis" x1="60"  y1="20"  x2="60"  y2="300"/>
  <line class="axis" x1="60"  y1="300" x2="740" y2="300"/>

  <!-- Legend -->
  <rect class="legend-box" x="640" y="25" width="90" height="55" rx="3"/>
  <line x1="648" y1="40" x2="668" y2="40" class="curve-hi"/>
  <text class="legend-text" x="673" y="44">max</text>
  <line x1="648" y1="55" x2="668" y2="55" class="curve-mid"/>
  <text class="legend-text" x="673" y="59">mid</text>
  <line x1="648" y1="70" x2="668" y2="70" class="curve-lo"/>
  <text class="legend-text" x="673" y="74">low</text>

  <!-- Title (replace per filter type) -->
  <text class="label" x="400" y="320" font-size="13" font-weight="bold">Lowpass Filter — edit path data per filter type</text>
</svg>
